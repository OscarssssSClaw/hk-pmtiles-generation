name: Deploy to R2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup s5cmd
        run: |
          curl -L -o s5cmd https://github.com/peak/s5cmd/releases/download/v2.2.2/s5cmd_2.2.2_Linux_amd64.tar.gz
          tar -xzf s5cmd -C /usr/local/bin s5cmd

      - name: Download PMTiles
        run: |
          curl -L -o hong-kong-raster.pmtiles "https://oscarsssssclaw.github.io/hk-pmtiles-generation/hong-kong-raster.pmtiles"
          ls -la hong-kong-raster.pmtiles

      - name: Upload to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          s5cmd cp hong-kong-raster.pmtiles s3://killbillhk/hong-kong-raster.pmtiles \
            --endpoint "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

      - name: Verify upload
        run: |
          echo "Checking R2 bucket..."
          s5cmd ls s3://killbillhk/ \
            --endpoint "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
