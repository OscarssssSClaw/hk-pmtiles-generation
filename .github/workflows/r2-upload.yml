name: Deploy to R2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws-region: auto
          service-endpoint: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Download PMTiles
        run: |
          curl -L -o hong-kong-raster.pmtiles "https://oscarsssssclaw.github.io/hk-pmtiles-generation/hong-kong-raster.pmtiles"
          ls -la hong-kong-raster.pmtiles

      - name: Upload to R2
        run: |
          aws s3 cp hong-kong-raster.pmtiles s3://killbillhk/hong-kong-raster.pmtiles

      - name: Verify upload
        run: |
          aws s3 ls s3://killbillhk/
